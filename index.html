<index.html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JPY/MYR 汇率转换器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 1.5rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
    </style>
</head>
<body>

<div class="glass-card w-full max-w-md p-8 m-4">
    <div class="text-center mb-8">
        <h1 class="text-2xl font-bold text-gray-800">汇率转换器</h1>
        <p class="text-gray-500 text-sm mt-2">日本日元 (JPY) ⇄ 马来西亚林吉特 (MYR)</p>
    </div>

    <!-- 汇率显示区 -->
    <div class="bg-blue-50 rounded-xl p-4 mb-6 text-center">
        <span class="text-sm text-blue-600 font-medium">当前参考汇率</span>
        <div class="text-xl font-bold text-blue-800 mt-1" id="rate-display">1 JPY = 0.0248 MYR</div>
        <div class="text-xs text-blue-400 mt-1" id="update-time">最后更新: 正在获取...</div>
    </div>

    <div class="space-y-4">
        <!-- 日元输入 -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">日本日元 (JPY)</label>
            <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <span class="text-gray-500">¥</span>
                </div>
                <input type="number" id="jpy-input" 
                    class="block w-full pl-8 pr-12 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-lg" 
                    placeholder="0.00" value="1000">
                <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
                    <span class="text-gray-400 font-bold text-xs">JPY</span>
                </div>
            </div>
        </div>

        <!-- 切换按钮 -->
        <div class="flex justify-center -my-2 relative z-10">
            <button id="swap-btn" class="bg-white border border-gray-200 rounded-full p-2 shadow-sm hover:bg-gray-50 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4" />
                </svg>
            </button>
        </div>

        <!-- 马币输入 -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">马来西亚林吉特 (MYR)</label>
            <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <span class="text-gray-500">RM</span>
                </div>
                <input type="number" id="myr-input" 
                    class="block w-full pl-10 pr-12 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-lg" 
                    placeholder="0.00">
                <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
                    <span class="text-gray-400 font-bold text-xs">MYR</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 快捷金额选择 -->
    <div class="mt-8">
        <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">快捷转换</h3>
        <div class="grid grid-cols-3 gap-2" id="quick-links">
            <button class="quick-btn text-xs py-2 px-3 bg-gray-100 hover:bg-gray-200 rounded-md text-gray-600" data-val="1000">1,000 JPY</button>
            <button class="quick-btn text-xs py-2 px-3 bg-gray-100 hover:bg-gray-200 rounded-md text-gray-600" data-val="10000">10,000 JPY</button>
            <button class="quick-btn text-xs py-2 px-3 bg-gray-100 hover:bg-gray-200 rounded-md text-gray-600" data-val="100000">10万 JPY</button>
        </div>
    </div>

    <div class="mt-8 text-center text-[10px] text-gray-400">
        * 汇率仅供参考，实际交易请以银行柜台为准。
    </div>
</div>

<script>
    // 模拟汇率 (在实际应用中，这里可以通过 API 获取最新数据)
    // 根据当前(2026年4月14日)模拟搜索结果
    let currentRate = 0.0248568; 
    
    const jpyInput = document.getElementById('jpy-input');
    const myrInput = document.getElementById('myr-input');
    const rateDisplay = document.getElementById('rate-display');
    const updateTime = document.getElementById('update-time');
    const quickBtns = document.querySelectorAll('.quick-btn');

    // 更新汇率显示和时间
    function updateHeader() {
        rateDisplay.innerText = `1 JPY = ${currentRate.toFixed(4)} MYR`;
        const now = new Date();
        updateTime.innerText = `最后更新: ${now.toLocaleDateString()} ${now.toLocaleTimeString()}`;
    }

    // 日元转马币
    function convertJpyToMyr() {
        const val = parseFloat(jpyInput.value);
        if (!isNaN(val)) {
            myrInput.value = (val * currentRate).toFixed(2);
        } else {
            myrInput.value = '';
        }
    }

    // 马币转日元
    function convertMyrToJpy() {
        const val = parseFloat(myrInput.value);
        if (!isNaN(val)) {
            jpyInput.value = (val / currentRate).toFixed(0);
        } else {
            jpyInput.value = '';
        }
    }

    // 监听输入事件
    jpyInput.addEventListener('input', convertJpyToMyr);
    myrInput.addEventListener('input', convertMyrToJpy);

    // 快捷按钮点击
    quickBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            jpyInput.value = btn.getAttribute('data-val');
            convertJpyToMyr();
        });
    });

    // 初始化显示
    window.onload = () => {
        updateHeader();
        convertJpyToMyr();
    };

    // 模拟 API 更新效果
    setInterval(() => {
        // 微小波动模拟
        const fluctuation = (Math.random() - 0.5) * 0.0001;
        currentRate += fluctuation;
        updateHeader();
        convertJpyToMyr();
    }, 10000);

</script>

</body>
</html>
